name: CI machine-os
run-name: >-
  CI machine-os${{
    inputs.nimbus_version != '' && format(' ({0})', inputs.nimbus_version)
    || startsWith(github.ref, 'refs/tags/') && format(' ({0})', github.ref_name)
    || ''
  }}

on:
  pull_request:
    paths:
      - "image/**"
      - "scripts/**"
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "SECURITY.md"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - "image/**"
      - "scripts/**"
      - "docs/**"
      - "AGENTS.md"
      - "README.md"
      - "SECURITY.md"
      - ".github/workflows/ci.yml"
  workflow_dispatch:
    inputs:
      nimbus_version:
        description: "Nimbus release tag to download (for example vX.Y.Z); defaults to the latest Nimbus release"
        required: false
        default: ""
        type: string
      image_reference:
        description: "Reference recorded in the local OCI layout summary"
        required: false
        default: "docker://ghcr.io/nimbus/machine-os:dev"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.nimbus_version || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  verify-contract:
    name: Verify machine-os contract
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out machine-os repository
        uses: actions/checkout@v6

      - name: Verify helper syntax and help entrypoints
        run: |
          bash -n scripts/build.sh
          bash -n scripts/check-selinux-avcs.sh
          bash -n scripts/package-oci.sh
          bash -n scripts/publish.sh
          bash -n scripts/write-sbom.sh
          bash -n scripts/verify-recipe.sh
          bash -n scripts/verify-build-helper.sh
          bash -n scripts/verify-oci-layout-helper.sh
          bash -n scripts/verify-publish-helper.sh
          bash -n scripts/verify-selinux-avc-gate.sh
          bash scripts/build.sh --help
          bash scripts/check-selinux-avcs.sh --help
          bash scripts/package-oci.sh --help
          bash scripts/publish.sh --help
          bash scripts/write-sbom.sh --help

      - name: Verify deterministic helper lanes
        run: |
          bash scripts/verify-recipe.sh
          bash scripts/verify-build-helper.sh
          bash scripts/verify-oci-layout-helper.sh
          bash scripts/verify-publish-helper.sh
          bash scripts/verify-selinux-avc-gate.sh

  build-arm64:
    name: Build machine-os (linux arm64)
    needs: verify-contract
    if: >-
      github.event_name == 'workflow_dispatch'
      || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: read

    steps:
      - name: Check out machine-os repository
        uses: actions/checkout@v6

      - name: Initialize build directories
        run: |
          {
            echo "BUILD_OUTPUT_DIR=${RUNNER_TEMP}/nimbus-machine-os"
            echo "LAYOUT_DIR=${RUNNER_TEMP}/nimbus-machine-os-layout"
          } >> "${GITHUB_ENV}"
          mkdir -p \
            "${RUNNER_TEMP}/nimbus-machine-os" \
            "${RUNNER_TEMP}/nimbus-machine-os-layout"

      - name: Determine nimbus version
        id: nimbus-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ -n "${{ inputs.nimbus_version }}" ]]; then
            tag="${{ inputs.nimbus_version }}"
          elif [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="$(gh api repos/nimbus/nimbus/releases/latest --jq '.tag_name')"
          fi

          if [[ -z "${tag}" ]]; then
            echo "could not determine Nimbus release tag" >&2
            exit 65
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Resolve image reference
        id: image-reference
        run: |
          image_reference="${{ inputs.image_reference }}"
          if [[ -z "${image_reference}" ]]; then
            if [[ "${GITHUB_REF:-}" == refs/tags/v* ]]; then
              image_reference="docker://ghcr.io/nimbus/machine-os:${GITHUB_REF_NAME}"
            else
              image_reference="docker://ghcr.io/nimbus/machine-os:dev"
            fi
          fi

          echo "image_reference=${image_reference}" >> "${GITHUB_OUTPUT}"

      - name: Download nimbus binary from GitHub Release
        run: |
          tag="${{ steps.nimbus-version.outputs.tag }}"
          curl -fsSL -o "${RUNNER_TEMP}/nimbus_linux_arm64.tar.gz" \
            "https://github.com/nimbus/nimbus/releases/download/${tag}/nimbus_linux_arm64.tar.gz"

      - name: Extract nimbus binary
        run: |
          tar xzf "${RUNNER_TEMP}/nimbus_linux_arm64.tar.gz" -C "${RUNNER_TEMP}"
          chmod +x "${RUNNER_TEMP}/nimbus"
          echo "nimbus_binary=${RUNNER_TEMP}/nimbus" >> "${GITHUB_ENV}"

      - name: Verify build-host requirements
        run: |
          command -v sudo
          command -v git
          command -v podman
          command -v gzip
          command -v sha256sum
          sudo -n true

      - name: Restore container image cache
        id: image-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/image-cache
          key: base-image-arm64-${{ hashFiles('image/Containerfile', 'image/build-common.sh', 'image/build.sh') }}
          restore-keys: |
            base-image-arm64-

      - name: Load cached container images
        run: |
          cache_dir="${RUNNER_TEMP}/image-cache"
          for archive in "${cache_dir}"/*.tar; do
            if [[ -f "${archive}" ]]; then
              echo "Loading $(basename "${archive}")..."
              sudo podman load -i "${archive}"
            fi
          done

      - name: Pull base images
        run: |
          sudo podman pull quay.io/fedora/fedora-bootc@sha256:187d480948fe37a4cc55211b8a594adfc4f85a7d17ac1991331bf98272eb8f94 &
          sudo podman pull quay.io/centos-bootc/bootc-image-builder@sha256:754fc17718f977313885379e2c779066aba7d15af88fe04b486baec74759f574 &
          wait

      - name: Build guest image
        run: |
          sudo bash scripts/build.sh \
            --nimbus-binary "${nimbus_binary}" \
            --nimbus-version "${{ steps.nimbus-version.outputs.tag }}" \
            --source-revision "${GITHUB_SHA}" \
            --output-dir "${BUILD_OUTPUT_DIR}"
          sudo chown -R "$(id -u):$(id -g)" \
            "${BUILD_OUTPUT_DIR}"

      - name: Save base image to cache
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          cache_dir="${RUNNER_TEMP}/image-cache"
          mkdir -p "${cache_dir}"
          sudo podman save -o "${cache_dir}/fedora-bootc-base.tar" quay.io/fedora/fedora-bootc@sha256:187d480948fe37a4cc55211b8a594adfc4f85a7d17ac1991331bf98272eb8f94
          sudo chown -R "$(id -u):$(id -g)" "${cache_dir}"

      - name: Package raw-disk OCI layout
        run: |
          bash scripts/package-oci.sh \
            --build-output-dir "${BUILD_OUTPUT_DIR}" \
            --image-reference "${{ steps.image-reference.outputs.image_reference }}" \
            --layout-dir "${LAYOUT_DIR}" \
            --arch arm64 \
            --source-repository-url "https://github.com/nimbus/machine-os" \
            --source-revision "${GITHUB_SHA}" \
            --attestation-repository "${{ github.repository }}" \
            --nimbus-version "${{ steps.nimbus-version.outputs.tag }}"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: machine-os-arm64-build
          if-no-files-found: error
          path: |
            ${{ env.BUILD_OUTPUT_DIR }}/summary.txt
            ${{ env.BUILD_OUTPUT_DIR }}/nimbus-machine-os.ociarchive
            ${{ env.BUILD_OUTPUT_DIR }}/nimbus-machine-os.raw.gz
            ${{ env.BUILD_OUTPUT_DIR }}/nimbus-machine-os.sbom.cdx.json
            ${{ env.LAYOUT_DIR }}/summary.txt
            ${{ env.LAYOUT_DIR }}/index.json
          compression-level: 0
