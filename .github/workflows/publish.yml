name: Publish machine-os staged bundle
run-name: >-
  Publish machine-os${{
    format(' ({0})', inputs.release_tag != '' && inputs.release_tag || inputs.nimbus_version)
  }}${{
    format(' from {0}#{1}', inputs.source_repository, inputs.source_run_id)
  }}${{
    format(' (attempt {0})', inputs.source_run_attempt != '' && inputs.source_run_attempt || '1')
  }}

on:
  workflow_dispatch:
    inputs:
      source_repository:
        description: "Repository that owns the staged machine-os bundle (for example nimbus/nimbus)"
        required: true
        type: string
      source_run_id:
        description: "Workflow run ID in the source repository that uploaded the staged machine-os bundle"
        required: true
        type: string
      source_run_attempt:
        description: "Workflow run attempt in the source repository, used for rerun-safe observability"
        required: false
        default: ""
        type: string
      nimbus_version:
        description: "Nimbus release tag recorded in the machine-os release notes"
        required: true
        type: string
      release_tag:
        description: "Machine-os release tag to create or update (e.g. vX.Y.Z)"
        required: false
        default: ""
        type: string
      stage_artifact_name:
        description: "Artifact name produced by the staging build lane"
        required: true
        type: string
      image_reference:
        description: "Immutable destination image reference for the packaged machine artifact"
        required: true
        type: string
      create_release:
        description: "Create or update a GitHub release in the machine-os repo"
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ inputs.release_tag || inputs.nimbus_version || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  publish-arm64:
    name: Publish machine-os (linux arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Check out machine-os repository
        uses: actions/checkout@v6
        with:
          repository: nimbus/nimbus-machine-os

      - name: Initialize publish directories
        run: |
          {
            echo "BUILD_OUTPUT_DIR=${RUNNER_TEMP}/nimbus-machine-os"
            echo "LAYOUT_DIR=${RUNNER_TEMP}/nimbus-machine-os-layout"
            echo "RELEASE_DIR=${RUNNER_TEMP}/nimbus-machine-os-release"
          } >> "${GITHUB_ENV}"
          mkdir -p \
            "${RUNNER_TEMP}/nimbus-machine-os" \
            "${RUNNER_TEMP}/nimbus-machine-os-layout" \
            "${RUNNER_TEMP}/nimbus-machine-os-release"

      - name: Resolve source repository coordinates
        id: source-repo
        run: |
          source_repository='${{ inputs.source_repository }}'
          source_owner="${source_repository%%/*}"
          source_repo="${source_repository#*/}"

          if [[ -z "${source_owner}" || -z "${source_repo}" || "${source_owner}" == "${source_repo}" ]]; then
            echo "source_repository must be in OWNER/REPO form; got '${source_repository}'." >&2
            exit 1
          fi

          {
            echo "repository=${source_repository}"
            echo "owner=${source_owner}"
            echo "repo=${source_repo}"
          } >> "${GITHUB_OUTPUT}"

      - name: Resolve release metadata
        id: release-metadata
        run: |
          release_tag='${{ inputs.release_tag }}'
          if [[ -z "${release_tag}" ]]; then
            release_tag='${{ inputs.nimbus_version }}'
          fi

          create_release='${{ inputs.create_release }}'
          if [[ -z "${create_release}" ]]; then
            create_release='true'
          fi

          {
            echo "release_tag=${release_tag}"
            echo "create_release=${create_release}"
          } >> "${GITHUB_OUTPUT}"

      - name: Verify source-artifact app credentials
        env:
          MACHINE_OS_RELEASE_APP_ID: ${{ vars.MACHINE_OS_RELEASE_APP_ID }}
          MACHINE_OS_RELEASE_APP_PRIVATE_KEY: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "${MACHINE_OS_RELEASE_APP_ID}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_ID must be configured in nimbus-machine-os so this workflow can mint a source-repo artifact token." >&2
            exit 1
          fi
          if [[ -z "${MACHINE_OS_RELEASE_APP_PRIVATE_KEY}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_PRIVATE_KEY must be configured in nimbus-machine-os so this workflow can mint a source-repo artifact token." >&2
            exit 1
          fi

      - name: Create source-repo artifact token
        id: source_repo_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.MACHINE_OS_RELEASE_APP_ID }}
          private-key: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ steps.source-repo.outputs.owner }}
          repositories: ${{ steps.source-repo.outputs.repo }}
          permission-actions: read
          permission-contents: read

      - name: Download staged machine-os bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.stage_artifact_name }}
          path: ${{ runner.temp }}/staged-machine-os
          repository: ${{ steps.source-repo.outputs.repository }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ steps.source_repo_token.outputs.token }}

      - name: Hydrate staged machine-os bundle
        run: |
          cp -R "${RUNNER_TEMP}/staged-machine-os/build-output/." "${BUILD_OUTPUT_DIR}/"
          cp -R "${RUNNER_TEMP}/staged-machine-os/layout/." "${LAYOUT_DIR}/"

      - name: Verify staged bundle contents
        run: |
          test -f "${BUILD_OUTPUT_DIR}/summary.txt"
          test -f "${BUILD_OUTPUT_DIR}/nimbus-machine-os.raw.gz"
          test -f "${LAYOUT_DIR}/summary.txt"
          test -f "${LAYOUT_DIR}/index.json"
          test -d "${LAYOUT_DIR}/blobs/sha256"

      - name: Publish packaged OCI artifact
        env:
          NIMBUS_MACHINE_OS_REGISTRY_USERNAME: ${{ github.actor }}
          NIMBUS_MACHINE_OS_REGISTRY_PASSWORD: ${{ github.token }}
        run: |
          bash scripts/publish.sh \
            --layout-dir "${LAYOUT_DIR}" \
            --build-output-dir "${BUILD_OUTPUT_DIR}" \
            --image-reference "${{ inputs.image_reference }}" \
            --release-dir "${RELEASE_DIR}"

      - name: Prepare GitHub release bundle
        if: steps.release-metadata.outputs.create_release == 'true'
        run: |
          cat > "${RELEASE_DIR}/machine-image-reference.txt" <<EOF_RELEASE_REF
          ghcr.io/nimbus/nimbus-machine-os:${{ steps.release-metadata.outputs.release_tag }}
          EOF_RELEASE_REF

          cat > "${RELEASE_DIR}/release-notes.md" <<EOF_RELEASE_NOTES
          nimbus-machine-os release ${{ steps.release-metadata.outputs.release_tag }}

          OCI image:
          - \`ghcr.io/nimbus/nimbus-machine-os:${{ steps.release-metadata.outputs.release_tag }}\`

          Source nimbus release:
          - \`https://github.com/${{ steps.source-repo.outputs.repository }}/releases/tag/${{ inputs.nimbus_version }}\`

          Source workflow run:
          - \`https://github.com/${{ steps.source-repo.outputs.repository }}/actions/runs/${{ inputs.source_run_id }}\`

          Included assets:
          - \`nimbus-machine-os.raw.gz\`
          - \`checksums.txt\`
          - \`publish-summary.txt\`
          - \`machine-image-reference.txt\`
          EOF_RELEASE_NOTES

      - name: Create or update GitHub release
        if: steps.release-metadata.outputs.create_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          release_tag='${{ steps.release-metadata.outputs.release_tag }}'
          release_repository='nimbus/nimbus-machine-os'
          release_target_sha="$(git rev-parse HEAD)"
          assets=(
            "${BUILD_OUTPUT_DIR}/nimbus-machine-os.raw.gz"
            "${RELEASE_DIR}/checksums.txt"
            "${RELEASE_DIR}/publish-summary.txt"
            "${RELEASE_DIR}/machine-image-reference.txt"
          )

          if gh release view "${release_tag}" --repo "${release_repository}" >/dev/null 2>&1; then
            gh release edit "${release_tag}" \
              --repo "${release_repository}" \
              --title "${release_tag}" \
              --notes-file "${RELEASE_DIR}/release-notes.md"
            gh release upload "${release_tag}" "${assets[@]}" --repo "${release_repository}" --clobber
          else
            gh release create "${release_tag}" \
              --repo "${release_repository}" \
              --target "${release_target_sha}" \
              --title "${release_tag}" \
              --notes-file "${RELEASE_DIR}/release-notes.md" \
              "${assets[@]}"
          fi

      - name: Attest staged machine-os provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            ${{ env.BUILD_OUTPUT_DIR }}/nimbus-machine-os.raw.gz
            ${{ env.RELEASE_DIR }}/checksums.txt

      - name: Upload publish bundle
        uses: actions/upload-artifact@v7
        with:
          name: nimbus-machine-os-arm64-publish
          if-no-files-found: error
          path: |
            ${{ env.RELEASE_DIR }}/publish-summary.txt
            ${{ env.RELEASE_DIR }}/checksums.txt
          compression-level: 0
